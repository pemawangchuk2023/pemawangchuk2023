<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pema Wangchuk Profile Banner</title>
  <desc id="desc">A custom profile banner for Pema Wangchuk, blending finance, code, Bitcoin history, and self-learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.38" stop-color="#082F49"/>
      <stop offset="0.68" stop-color="#064E3B"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(990 106) rotate(128) scale(404 238)">
      <stop stop-color="#F59E0B" stop-opacity="0.72"/>
      <stop offset="0.44" stop-color="#F59E0B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 360) rotate(-22) scale(444 216)">
      <stop stop-color="#22D3EE" stop-opacity="0.48"/>
      <stop offset="0.5" stop-color="#14B8A6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="170" y1="265" x2="1090" y2="265" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#38BDF8"/>
      <stop offset="0.54" stop-color="#F59E0B"/>
      <stop offset="0.86" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#38BDF8" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="420" rx="34" fill="url(#amberGlow)"/>
  <rect width="1280" height="420" rx="34" fill="url(#cyanGlow)"/>

  <path d="M84 315 C208 270 260 332 378 288 C478 251 520 154 631 176 C757 202 760 306 899 263 C1005 230 1056 132 1198 158" stroke="#94A3B8" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M96 332 C248 274 314 314 438 253 C555 196 604 92 733 129 C855 164 876 260 1008 215 C1096 185 1130 128 1208 132" stroke="url(#goldLine)" stroke-width="3" stroke-linecap="round"/>

  <g opacity="0.86" filter="url(#softShadow)">
    <rect x="850" y="82" width="276" height="210" rx="28" fill="#020617" fill-opacity="0.58" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <circle cx="988" cy="154" r="54" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M989 117V191" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/>
    <path d="M963 134H1001C1015 134 1024 141 1024 153C1024 166 1014 172 1000 172H963" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M963 154H1006C1021 154 1031 162 1031 176C1031 190 1020 198 1004 198H963" transform="translate(0 -16)" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="988" y="247" text-anchor="middle" fill="#E5E7EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Bitcoin Historian</text>
    <text x="988" y="272" text-anchor="middle" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Satoshi Nakamoto to Nick Szabo</text>
  </g>

  <g opacity="0.92">
    <rect x="95" y="70" width="76" height="76" rx="20" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <path d="M121 111L135 97L149 111" stroke="#2DD4BF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M121 126H150" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g filter="url(#textGlow)">
    <text x="95" y="188" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="0">Pema Wangchuk</text>
    <text x="98" y="228" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">Finance Professional | Programmer by Interest | Bitcoin Historian</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.4">
    <rect x="98" y="278" width="151" height="38" rx="19" fill="#0F172A" fill-opacity="0.72" stroke="#38BDF8" stroke-opacity="0.3"/>
    <text x="174" y="303" text-anchor="middle" fill="#BAE6FD">SELF-LEARNING</text>

    <rect x="264" y="278" width="132" height="38" rx="19" fill="#0F172A" fill-opacity="0.72" stroke="#F59E0B" stroke-opacity="0.38"/>
    <text x="330" y="303" text-anchor="middle" fill="#FDE68A">ACCOUNTING</text>

    <rect x="411" y="278" width="184" height="38" rx="19" fill="#0F172A" fill-opacity="0.72" stroke="#2DD4BF" stroke-opacity="0.35"/>
    <text x="503" y="303" text-anchor="middle" fill="#99F6E4">SMART CONTRACTS</text>

    <rect x="610" y="278" width="190" height="38" rx="19" fill="#0F172A" fill-opacity="0.72" stroke="#C084FC" stroke-opacity="0.32"/>
    <text x="705" y="303" text-anchor="middle" fill="#E9D5FF">WEB DEVELOPMENT</text>
  </g>

  <g opacity="0.36">
    <text x="92" y="366" fill="#E2E8F0" font-family="JetBrains Mono, Consolas, monospace" font-size="16">const mission = "accounting + smart contracts + web development";</text>
    <text x="92" y="392" fill="#A7F3D0" font-family="JetBrains Mono, Consolas, monospace" font-size="16">build(decentralizedFuture).with(TypeScript, Python, Solidity)</text>
  </g>

  <g opacity="0.42">
    <rect x="1138" y="300" width="10" height="54" rx="5" fill="#38BDF8"/>
    <rect x="1158" y="262" width="10" height="92" rx="5" fill="#2DD4BF"/>
    <rect x="1178" y="284" width="10" height="70" rx="5" fill="#F59E0B"/>
    <rect x="1198" y="232" width="10" height="122" rx="5" fill="#C084FC"/>
  </g>
</svg>
